version: '3.8'

services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: mall-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: mall
    ports:
      - "5432:5432"
    networks:
      - mall-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: mall-redis
    command: redis-server --requirepass root
    ports:
      - "6379:6379"
    networks:
      - mall-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: mall-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - mall-network

  # API Gateway
  gateway:
    build:
      context: .
      dockerfile: ./apps/gateway/Dockerfile
    container_name: mall-gateway
    ports:
      - "18001:18001"
    environment:
      - PORT=18001
    depends_on:
      - api-auth
      - api-order
    networks:
      - mall-network

  # API Auth (NestJS)
  api-auth:
    build:
      context: .
      dockerfile: ./apps/api-auth/Dockerfile
    container_name: mall-api-auth
    environment:
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=mall
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=root
    depends_on:
      - postgres
      - redis
    networks:
      - mall-network

  # API Order (Spring Boot)
  api-order:
    build:
      context: .
      dockerfile: ./apps/api-order/Dockerfile
    container_name: mall-api-order
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/mall
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=root
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - mall-network

  # Web Mall (Next.js)
  web-mall:
    build:
      context: .
      dockerfile: ./apps/web-mall/Dockerfile
    container_name: mall-web-mall
    ports:
      - "13001:13001"
    environment:
      - NEXT_PUBLIC_API_URL=http://gateway:18001
    depends_on:
      - gateway
    networks:
      - mall-network

  # Web Admin (SvelteKit)
  web-admin:
    build:
      context: .
      dockerfile: ./apps/web-admin/Dockerfile
    container_name: mall-web-admin
    ports:
      - "13002:5173"
    environment:
      - VITE_API_URL=http://gateway:18001
    depends_on:
      - gateway
    networks:
      - mall-network

networks:
  mall-network:
    driver: bridge
