server:
  port: 18080

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: api-order
  datasource:
    url: jdbc:postgresql://localhost:15432/mall_db
    username: mall_user
    password: mall_password
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 16379
      password: root
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write_dates_as_timestamps: false
